# Cyberdream tmux setup

# Terminal behavior
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"
set -as terminal-features ",wezterm:RGB"
set -g mouse on
set -g history-limit 50000
set -g focus-events on
set -g set-clipboard on
set -g escape-time 10
set -g detach-on-destroy off

# Number windows and panes from 1 for easier keyboard jumps.
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Vim-style copy mode.
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection

if-shell -b 'command -v pbcopy >/dev/null 2>&1' \
  'bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"'
if-shell -b 'command -v clip.exe >/dev/null 2>&1' \
  'bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "clip.exe"'

# Session ergonomics
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux config reloaded"
bind / display-popup -w 82% -h 78% -E "less ~/.dotfiles/docs/tmux.md"
bind c new-window -c "#{pane_current_path}"

unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Transparent, terminal-native Cyberdream statusline so WezTerm blur shows through.
set -g status on
set -g status-position bottom
set -g status-interval 5
set -g status-left-length 80
set -g status-right-length 120
set -g status-style "fg=#ffffff,bg=default"
set -g window-status-separator "  "
set -g window-status-format "#[fg=#7b8496,bg=default]#I:#W"
set -g window-status-current-format "#[fg=#5ef1ff,bg=default,bold]#I:#W"
set -g status-left "#[fg=#bd5eff,bg=default,bold] #S #[fg=#3c4048,bg=default]| "
set -g status-right "#[fg=#f1ff5e,bg=default]#{?client_prefix,prefix ,}#[fg=#7b8496,bg=default]#{pane_current_command} #[fg=#3c4048,bg=default]#{b:pane_current_path} #[fg=#5ef1ff,bg=default]%H:%M "

set -g pane-border-style "fg=#3c4048,bg=default"
set -g pane-active-border-style "fg=#5ef1ff,bg=default"
set -g message-style "fg=#16181a,bg=#5ef1ff"
set -g mode-style "fg=#16181a,bg=#bd5eff"
